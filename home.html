<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payoo | HomePage</title>
    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon" />
    <!-- Daisy UI + tailwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- Font awesome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      * {
        font-family: "Outfit";
      }
    </style>
  </head>
  <body class="min-h-screen max-w-md bg-base-200 mx-auto">
    <!-- Header and navbar section -->
    <header class="border-b-2 border-gray-200 sticky top-0 z-10 bg-base-200">
      <nav class="flex justify-between items-center px-5 py-2">
        <div class="flex gap-1">
          <img src="./assets/logo.png" class="w-15 h-12" />
          <div class="balance-info">
            <h2 class="text-2xl font-bold">
              <span id="balance">1000</span> taka
            </h2>
            <p class="text-neutral/50">Available Balance</p>
          </div>
        </div>
        <a href="./index.html" class="opacity-70"
          ><button class="btn btn-soft">
            <span
              ><i
                class="fa-solid fa-arrow-right-from-bracket fa-rotate-180 opacity-60"
                style="color: rgb(0, 0, 0)"
              ></i
            ></span>
            Log Out
          </button></a
        >
      </nav>
    </header>
    <!-- All buttons section  -->
    <section>
      <div class="space-y-5 py-10 px-5">
        <h2 class="text-3xl outfit font-bold">
          Welcome to Pay<span class="text-primary">oo</span>
        </h2>
        <p class="text-neutral/50">
          Enjoy easy and convenient financial services with us. Cashout charge
          is low and
        </p>
      </div>
      <!-- Buttons -->
      <div class="buttons grid grid-cols-3 gap-5 px-5 py-2">
        <button
          onclick="showOnly('addmoney')"
          class="text-center h-full flex-col rounded-xl p-5 btn btn-primary/80 btn-soft"
        >
          <img src="./assets/opt-1.png" class="mx-auto" />
          <p class="text-neutral/50 pt-2">Add Money</p>
        </button>
        <button
          onclick="showOnly('cashout')"
          class="text-center h-full flex-col rounded-xl p-5 btn btn-primary/80 btn-soft"
        >
          <img src="./assets/opt-2.png" class="mx-auto" />
          <p class="text-neutral/50 pt-2">Cashout</p>
        </button>
        <button
          onclick="showOnly('transfer-money')"
          class="text-center h-full flex-col rounded-xl p-5 btn btn-primary/80 btn-soft"
        >
          <img src="./assets/opt-3.png" class="mx-auto" />
          <p class="text-neutral/50 pt-2">Transfer Money</p>
        </button>
        <button
          onclick="showOnly('get-bonus')"
          class="text-center h-full flex-col rounded-xl p-5 btn btn-primary/80 btn-soft"
        >
          <img src="./assets/opt-4.png" class="mx-auto" />
          <p class="text-neutral/50 pt-2">Get Bonus</p>
        </button>
        <button
          onclick="showOnly('pay-bill')"
          class="text-center h-full flex-col rounded-xl p-5 btn btn-primary/80 btn-soft"
        >
          <img src="./assets/opt-5.png" class="mx-auto" />
          <p class="text-neutral/50 pt-2">Pay Bill</p>
        </button>
        <button
          onclick="showOnly('history')"
          class="text-center h-full flex-col rounded-xl p-5 btn btn-primary/80 btn-soft"
        >
          <img src="./assets/opt-6.png" class="mx-auto" />
          <p class="text-neutral/50 pt-2">Transactions</p>
        </button>
      </div>
    </section>

    <!-- Add money section -->
    <section id="addmoney" class="w-11/12 mx-auto py-5 hidden">
      <h2 class="text-2xl font-bold Outfit mb-5">Add Money</h2>
      <div class="card bg-base-100 w-full shadow-sm rounded-3xl">
        <div class="card-body">
          <fieldset class="fieldset">
            <label class="label text-neutral font-bold">Select A Bank</label>
            <select
              id="add-money-bank"
              class="select rounded-full bg-base-200 outline-none w-full"
            >
              <option disabled selected>Select bank</option>
              <option value="DBBL">DBBL</option>
              <option value="IBBL">IBBL</option>
              <option value="BRAC BANK">BRAC BANK</option>
              <option value="CITY BANK">CITY BANK</option>
              <option value="AB BANK">AB BANK</option>
            </select>

            <label class="label text-neutral font-bold"
              >Bank Account Number</label
            >
            <input
              id="add-money-number"
              maxlength="13"
              minlength="13"
              type="number"
              value="0123456789012"
              class="input rounded-full bg-base-200 outline-none w-full"
              placeholder="Enter 11 digit account number"
            />
            <label class="label text-neutral font-bold">Amount to Add</label>
            <input
              id="add-money-amount"
              maxlength="6"
              minlength="3"
              type="number"
              class="input rounded-full bg-base-200 outline-none w-full"
              placeholder="Add Amount to withdraw"
            />

            <label class="label text-neutral font-bold pt-3">Pin Number</label>
            <input
              id="add-money-pin"
              maxlength="4"
              minlength="4"
              type="password"
              class="input rounded-full bg-base-200 outline-none w-full"
              placeholder="Enter 4 digit pin number"
            />

            <button
              id="add-money-btn"
              type="submit"
              class="btn btn-primary mt-4 rounded-full"
            >
              Add Money
            </button>
          </fieldset>
        </div>
      </div>
    </section>

    <!-- Cashout section -->
    <section id="cashout" class="w-11/12 mx-auto py-5 hidden">
      <h2 class="text-2xl font-bold Outfit mb-5">Cash Out</h2>
      <div class="card bg-base-100 w-full shadow-sm rounded-3xl">
        <div class="card-body">
          <fieldset class="fieldset">
            <label class="label text-neutral font-bold">Agent Number</label>
            <input
              id="cashout-number"
              maxlength="11"
              minlength="11"
              type="number"
              value="01234567890"
              class="input rounded-full bg-base-200 outline-none w-full"
              placeholder="Enter 11 digit number"
            />
            <label class="label text-neutral font-bold">Amount</label>
            <input
              id="cashout-amount"
              maxlength="6"
              minlength="3"
              type="number"
              class="input rounded-full bg-base-200 outline-none w-full"
              placeholder="Enter amount to withdraw"
            />
            <label class="label text-neutral font-bold pt-3">Pin Number</label>
            <input
              id="cashout-pin"
              maxlength="4"
              minlength="4"
              type="password"
              class="input rounded-full bg-base-200 outline-none w-full"
              placeholder="Enter 4 digit pin number"
            />
            <button
              id="cashout-btn"
              type="submit"
              class="btn btn-primary mt-4 rounded-full"
            >
              Withdraw Money
            </button>
          </fieldset>
        </div>
      </div>
    </section>

    <!-- Transtions History section -->
    <section id="history" class="w-11/12 mx-auto py-5 hidden">
      <h2 class="text-2xl font-bold Outfit mb-5">Transaction History</h2>
      <div id="history-container"></div>
    </section>

    <!-- Transfer Money Section -->
    <section id="transfer-money" class="w-11/12 mx-auto py-5 hidden">
      <h2 class="text-2xl font-bold Outfit mb-5">Transfer Money</h2>
      <div class="card bg-base-100 w-full shadow-sm rounded-3xl">
        <div class="card-body">
          <fieldset class="fieldset">
            <label class="label text-neutral font-bold"
              >User Account Number</label
            >
            <input
              id="trasnfer-number"
              maxlength="11"
              minlength="11"
              type="number"
              value="01234567890"
              class="input rounded-full bg-base-200 outline-none w-full"
              placeholder="Enter 11 digit number"
            />
            <label class="label text-neutral font-bold pt-3">Amount</label>
            <input
              id="trasnfer-amount"
              maxlength="6"
              minlength="3"
              type="number"
              class="input rounded-full bg-base-200 outline-none w-full"
              placeholder="Enter amount to trasnfer"
            />
            <label class="label text-neutral font-bold pt-3">Pin Number</label>
            <input
              id="transfer-pin"
              maxlength="4"
              minlength="4"
              type="password"
              class="input rounded-full bg-base-200 outline-none w-full"
              placeholder="Enter 4 digit pin number"
            />
            <button
              id="trasnfer-btn"
              type="submit"
              class="btn btn-primary mt-4 rounded-full"
            >
              Send Now
            </button>
          </fieldset>
        </div>
      </div>
    </section>

    <!-- Get Bonus Section -->
    <section id="get-bonus" class="w-11/12 mx-auto py-5 hidden">
      <h2 class="text-2xl font-bold Outfit mb-5">Get Bonus</h2>
      <div class="card bg-base-100 w-full shadow-sm rounded-3xl">
        <div class="card-body">
          <fieldset class="fieldset">
            <label class="label text-neutral font-bold"
              >Enter Bonus Coupon</label
            >
            <input
              id="bonus-number"
              maxlength=""
              type="text"
              class="input rounded-full bg-base-200 outline-none w-full"
              placeholder="Enter your coupon code"
            />
            <button
              id="bonus-btn"
              type="submit"
              class="btn btn-primary mt-4 rounded-full"
            >
              Get Bonus
            </button>
          </fieldset>
        </div>
      </div>
    </section>

    <!-- Pay Bill Section -->
    <section id="pay-bill" class="w-11/12 mx-auto py-5 hidden">
      <h2 class="text-2xl font-bold Outfit mb-5">Pay Bill</h2>
      <div class="card bg-base-100 w-full shadow-sm rounded-3xl">
        <div class="card-body">
          <fieldset class="fieldset">
            <label class="label text-neutral font-bold">Select To Pay</label>
            <select
              id="pay-bill-bank"
              class="select rounded-full bg-base-200 outline-none w-full"
            >
              <option disabled selected>Select bank</option>
              <option value="DBBL">DBBL</option>
              <option value="IBBL">IBBL</option>
              <option value="BRAC BANK">BRAC BANK</option>
              <option value="CITY BANK">CITY BANK</option>
              <option value="AB BANK">AB BANK</option>
            </select>

            <label class="label text-neutral font-bold"
              >Biller Account Number</label
            >
            <input
              id="pay-bill-number"
              maxlength="13"
              minlength="13"
              type="number"
              value="0123456789012"
              class="input rounded-full bg-base-200 outline-none w-full"
              placeholder="Enter account number"
            />
            <label class="label text-neutral font-bold">Amount to Pay</label>
            <input
              id="pay-bill-amount"
              maxlength="6"
              minlength="3"
              type="number"
              class="input rounded-full bg-base-200 outline-none w-full"
              placeholder="Add Amount to pay"
            />

            <label class="label text-neutral font-bold pt-3">Pin Number</label>
            <input
              id="pay-bill-pin"
              maxlength="4"
              minlength="4"
              type="password"
              class="input rounded-full bg-base-200 outline-none w-full"
              placeholder="Enter 4 digit pin number"
            />

            <button
              id="pay-bill-btn"
              type="submit"
              class="btn btn-primary mt-4 rounded-full"
            >
              Pay Now
            </button>
          </fieldset>
        </div>
      </div>
    </section>

    <!-- All Scripts -->
    <script src="script/machine.js"></script>
    <script src="script/addmoney.js"></script>
    <script src="script/cashout.js"></script>
    <script src="script/transfer.js"></script>
    <script src="script/paybill.js"></script>
    <script src="script/getBonus.js"></script>
  </body>
</html>
